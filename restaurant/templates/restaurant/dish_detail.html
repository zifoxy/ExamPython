{% extends 'restaurant/base.html' %}
{% block title %}{{ dish.name }}{% endblock %}

{% block content %}
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'menu' %}">Меню</a></li>
    <li class="breadcrumb-item active">{{ dish.name }}</li>
  </ol>
</nav>

<div class="row g-4">
  <div class="col-md-6">
    {% if dish.image %}
      <img src="{{ dish.image.url }}" class="img-fluid rounded shadow-sm w-100" alt="{{ dish.name }}">
    {% else %}
      <img src="https://placehold.co/600x400/dee2e6/6c757d?text=Блюдо"
           class="img-fluid rounded shadow-sm w-100" alt="">
    {% endif %}
  </div>
  <div class="col-md-6">
    <span class="badge text-bg-secondary mb-2">{{ dish.category.name }}</span>
    <h1 class="mb-3">{{ dish.name }}</h1>
    <p class="text-muted">{{ dish.description }}</p>
    <p class="display-6 text-danger fw-bold">{{ dish.price }} ₽</p>

    <form method="post" action="{% url 'cart_add' dish.id %}" class="row g-2 align-items-end mt-3">
      {% csrf_token %}
      <div class="col-auto">
        <label class="form-label" for="quantity">Количество</label>
        <input class="form-control" type="number" name="quantity" id="quantity" value="1" min="1" style="width: 100px;">
      </div>
      <div class="col-auto">
        <button type="submit" class="btn btn-primary btn-lg">
          <i class="bi bi-cart-plus"></i> В корзину
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
