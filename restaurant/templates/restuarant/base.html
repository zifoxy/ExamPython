<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Доставка{% endblock %}</title>
  <style>
    :root {
      --bg: #1a1512;
      --surface: #2a221c;
      --accent: #e85d04;
      --text: #f5ebe0;
      --muted: #a89888;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: radial-gradient(ellipse at top, #2c2118, var(--bg));
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--accent); text-decoration: none; }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: rgba(0,0,0,.35);
      border-bottom: 1px solid #3d3228;
    }
    .logo { font-size: 1.5rem; font-weight: bold; color: var(--text); }
    .cart-link {
      background: var(--accent);
      color: #fff;
      padding: .5rem 1rem;
      border-radius: 6px;
    }
    main { max-width: 1000px; margin: 0 auto; padding: 2rem 1rem; }
    .btn {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: .6rem 1.2rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1rem;
    }
    .btn:hover { opacity: .9; }
    .messages { list-style: none; margin-bottom: 1rem; }
    .messages li {
      background: #3d2a1a;
      padding: .75rem 1rem;
      border-radius: 6px;
      margin-bottom: .5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.25rem;
    }
    .card {
      background: var(--surface);
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #3d3228;
    }
    .card img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      background: #1a1512;
    }
    .card-body { padding: 1rem; }
    .price { color: var(--accent); font-weight: bold; margin: .5rem 0; }
    .muted { color: var(--muted); font-size: .9rem; }
    table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
    th, td { padding: .75rem; text-align: left; border-bottom: 1px solid #3d3228; }
    .form-control {
      width: 100%;
      padding: .6rem;
      margin: .4rem 0 1rem;
      border: 1px solid #3d3228;
      border-radius: 6px;
      background: #1a1512;
      color: var(--text);
    }
    label { display: block; margin-top: .5rem; }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="{% url 'menu' %}">🔥 FireBite</a>
    <a class="cart-link" href="{% url 'cart_detail' %}">
      Корзина{% if cart_count %} ({{ cart_count }}){% endif %}
    </a>
  </header>
  <main>
    {% if messages %}
      <ul class="messages">
        {% for message in messages %}
          <li>{{ message }}</li>
        {% endfor %}
      </ul>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
