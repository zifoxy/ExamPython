<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Доставка{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
      <a class="navbar-brand fw-bold" href="{% url 'menu' %}">
        <i class="bi bi-fire"></i> FireBite
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'menu' %}">Меню</a>
          </li>
        </ul>
        <a class="btn btn-warning" href="{% url 'cart_detail' %}">
          <i class="bi bi-cart3"></i>
          Корзина
          {% if cart_count %}
            <span class="badge text-bg-dark">{{ cart_count }}</span>
          {% endif %}
        </a>
      </div>
    </div>
  </nav>

  <main class="container pb-5">
    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'success' }} alert-dismissible fade show" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}

    {% block content %}{% endblock %}
  </main>

  <footer class="border-top py-4 mt-auto bg-white">
    <div class="container text-center text-muted small">
      © FireBite — доставка еды
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
